name: Publish

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  pypi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}

  docker:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: ["15", "16", "17", "18"]
        include_network: [false, true]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Scaleway Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ vars.SCW_REGISTRY }}
          username: nologin
          password: ${{ secrets.SCW_SECRET_KEY }}

      - name: Compute tags and build args
        id: meta
        run: |
          set -euo pipefail
          IMG="${{ vars.SCW_REGISTRY }}/padmy"
          PG="${{ matrix.pg_version }}"
          NET="${{ matrix.include_network }}"
          VERSION="${{ github.ref_name }}"

          if [[ "${NET}" == "true" ]]; then
            VARIANT="network-${PG}"
            BUILD_ARGS=$'PG_VERSION='"${PG}"$'\nUV_PARAMS=--group network'
          else
            VARIANT="${PG}"
            BUILD_ARGS="PG_VERSION=${PG}"
          fi

          {
            echo "tags<<EOF"
            echo "${IMG}:${VERSION}-${VARIANT}"
            echo "${IMG}:latest-${VARIANT}"
            echo "EOF"
            echo "build_args<<EOF"
            printf '%s\n' "${BUILD_ARGS}"
            echo "EOF"
            echo "scope=${VARIANT}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: ${{ steps.meta.outputs.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ steps.meta.outputs.scope }}
          cache-to: type=gha,scope=${{ steps.meta.outputs.scope }},mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=padmy CLI (PostgreSQL ${{ matrix.pg_version }}${{ matrix.include_network && ', network extras' || '' }})
            org.opencontainers.image.licenses=MIT
