name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --locked --group dev --group network --group anonymize
      - name: Install psql client
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update && sudo apt-get install -y postgresql-client-17
      - name: Initialize DB
        env:
          PGHOST: 127.0.0.1
          PGUSER: postgres
          PGPASSWORD: postgres
          POSTGRES_USER: postgres
          INIT_FILE: ./tests/init.sql
          SQL_FOLDER: ./tests/static
        run: ./tests/static/init-pg.sh
      - name: Lint
        run: |
          uv run ruff check padmy tests
          uv run ruff format --check padmy tests
      - name: Type check
        run: uv run pyright
      - name: Tests
        env:
          PGHOST: 127.0.0.1
          PGUSER: postgres
          PGPASSWORD: postgres
        run: uv run pytest

  bump:
    if: github.ref == 'refs/heads/master'
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v5
      - name: Install bump tools
        run: uv sync --locked --group bump
      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Bump version
        run: |
          uv run cz bump --yes || {
            code=$?
            [ $code -eq 21 ] && echo "Nothing to bump, skipping" && exit 0
            exit $code
          }
      - name: Push
        run: git push --follow-tags
